name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --all-targets

      - name: Test
        run: cargo test

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-

      - name: Clippy
        run: cargo clippy --workspace --exclude spur-ffi --all-targets -- -W clippy::all -D unused

  cluster:
    name: Cluster Tests (2x MI300X)
    runs-on: [self-hosted, mi300x, primary]
    needs: [build-and-test, fmt, clippy]
    # Only one cluster run at a time; cancel older runs on the same ref.
    concurrency:
      group: cluster-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Build release binaries
        run: |
          export PATH="$HOME/bin:$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          export PROTOC="$HOME/bin/protoc"
          export PROTOC_INCLUDE="$HOME/protoc-install/include"
          cargo build --release -j 4

      - name: Stop any running cluster and clear state
        run: |
          ssh mi300-2 '~/spur/etc/stop-agent.sh' 2>/dev/null || true
          ~/spur/etc/stop-all.sh 2>/dev/null || true
          sleep 2
          # Clear WAL and snapshots so ghost Running jobs from previous
          # runs don't pollute the new cluster.
          rm -rf ~/spur/state/*
          ssh mi300-2 'rm -rf ~/spur/state/*' 2>/dev/null || true

      - name: Deploy fresh binaries and test scripts
        run: |
          cp target/release/spur target/release/spurctld target/release/spurd \
             target/release/spurdbd target/release/spurrestd \
             target/release/spur-k8s-operator ~/spur/bin/
          rsync -a --checksum \
            target/release/spur \
            target/release/spurd \
            mi300-2:~/spur/bin/
          # Keep test scripts in sync with the repo on both nodes
          chmod +x deploy/bare-metal/inference_job.sh deploy/bare-metal/distributed_job.sh
          rsync -a --checksum \
            deploy/bare-metal/inference_test.py \
            deploy/bare-metal/inference_job.sh \
            deploy/bare-metal/distributed_test.py \
            deploy/bare-metal/distributed_job.sh \
            ~/spur/
          rsync -a --checksum \
            deploy/bare-metal/inference_test.py \
            deploy/bare-metal/inference_job.sh \
            deploy/bare-metal/distributed_test.py \
            deploy/bare-metal/distributed_job.sh \
            mi300-2:~/spur/

      - name: Start cluster
        run: |
          ~/spur/etc/start-controller.sh
          ssh mi300-2 '~/spur/etc/start-agent.sh'
          sleep 5

      - name: Verify both nodes idle
        run: |
          ~/spur/bin/sinfo
          if ! ~/spur/bin/sinfo | grep -qE "2\s+idle"; then
            echo "ERROR: Expected 2 idle nodes, got:"
            ~/spur/bin/sinfo
            exit 1
          fi

      - name: Run integration tests
        run: bash deploy/bare-metal/cluster_test.sh

      - name: Stop cluster
        if: always()
        run: |
          ssh mi300-2 '~/spur/etc/stop-agent.sh' || true
          ~/spur/etc/stop-all.sh || true

  build-docker-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [build-and-test, fmt, clippy]
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "value=${{ secrets.REGISTRY }}/spur:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Log in to registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.REGISTRY }}/spur:${{ github.sha }}
            ${{ secrets.REGISTRY }}/spur:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max


  test-k8s:
    name: Test on Kubernetes
    runs-on: [self-hosted, amd-aac02-rocm]
    needs: build-docker-image
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Patch image tag in manifests
        env:
          IMAGE_TAG: ${{ needs.build-docker-image.outputs.image_tag }}
        run: |
          find deploy/k8s -name '*.yaml' | xargs sed -i \
            "s|image: spur:latest|image: ${IMAGE_TAG}|g"

      - name: Rebuild CRD generator
        run: |
          source ~/.cargo/env
          cargo build --release --bin spur-k8s-operator

      - name: Deploy to Kubernetes
        env:
          IMAGE_TAG: ${{ needs.build-docker-image.outputs.image_tag }}
          KUBECONFIG: /home/amd/.kube/config
        run: |
          set -euo pipefail
          kubectl config use-context kubernetes-admin@kubernetes

          echo "==> 1. Namespace"
          kubectl apply -f deploy/k8s/namespace.yaml

          echo "==> 2. RBAC"
          kubectl apply -f deploy/k8s/rbac.yaml

          echo "==> 3. SpurJob CRD"
          ./target/release/spur-k8s-operator generate-crd | kubectl apply -f -

          echo "==> 4. ConfigMap"
          kubectl apply -f deploy/k8s/configmap.yaml

          echo "==> 5. Accounting daemon"
          kubectl apply -f deploy/k8s/spurdbd.yaml

          echo "==> 6. Controller + PDB"
          kubectl apply -f deploy/k8s/spurctld.yaml
          kubectl apply -f deploy/k8s/pdb.yaml
          kubectl rollout status statefulset/spurctld -n spur --timeout=180s

          echo "==> 7. REST API"
          kubectl apply -f deploy/k8s/spurrestd.yaml

          echo "==> 8. Operator"
          kubectl apply -f deploy/k8s/operator.yaml
          kubectl rollout status deployment/spur-k8s-operator -n spur --timeout=120s

          echo "==> Done. Current state:"
          kubectl get all -n spur

          echo "==> Verify: Raft leader election"
          kubectl logs -n spur spurctld-0 | grep -i leader || echo "No leader log yet"

          echo "==> Verify: Operator node registration"
          kubectl logs -n spur deploy/spur-k8s-operator | grep -i register || echo "No registration log yet"

          echo "==> Verify: Health checks"
          kubectl port-forward -n spur deploy/spur-k8s-operator 8080:8080 &
          PF_PID=$!
          sleep 3
          curl -sf http://localhost:8080/healthz && echo "healthz OK" || echo "healthz FAILED"
          curl -sf http://localhost:8080/readyz && echo "readyz OK" || echo "readyz FAILED"
          kill $PF_PID

  k8s:
    name: K8s Integration
    runs-on: [self-hosted, mi300x]
    needs: build-docker-image
    concurrency:
      group: k8s-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Run K8s integration tests
        run: SPUR_CI_IMAGE=${{ needs.build-docker-image.outputs.image_tag }} bash deploy/bare-metal/k8s_test.sh

      - name: Cleanup kind cluster
        if: always()
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          sg docker -c "kind delete cluster --name spur-ci" 2>/dev/null || true
