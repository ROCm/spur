# Manual perf comparison: PR binaries vs latest nightly on bare-metal cluster.
#
# workflow_dispatch only — not part of default CI/E2E.
name: Perf

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Open PR number to benchmark
        required: true
        type: number
      tiers:
        description: SPUR_PERF_TIERS (space-separated job counts)
        required: false
        default: "50"
        type: string
      parallel:
        description: SPUR_PERF_PARALLEL
        required: false
        default: "32"
        type: string
      fail_on_regression:
        description: Fail workflow if comparison shows regressions
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  perf-compare:
    name: Perf PR vs nightly
    runs-on: [self-hosted, bare-metal-cluster]
    concurrency:
      group: native-host-cluster
      queue: max
    env:
      BM_NODES: ${{ secrets.BM_NODES }}
      BM_SSH_USER: ${{ secrets.BM_SSH_USER }}
      BM_REMOTE_BIN_DIR: /tmp/spur-ci-bin
      BM_REMOTE_BIN_DIR_PR: /tmp/spur-ci-bin-perf-pr
      BM_REMOTE_BIN_DIR_NIGHTLY: /tmp/spur-ci-bin-perf-nightly
      PERF_ASSETS_DIR: /tmp/spur-perf-assets-${{ github.run_id }}
      SPUR_PERF_TIERS: ${{ inputs.tiers }}
      SPUR_PERF_PARALLEL: ${{ inputs.parallel }}
    steps:
      - name: Resolve PR head SHA
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PR="${{ inputs.pr_number }}"
          HEAD_SHA=$(gh pr view "$PR" --repo "${{ github.repository }}" --json headRefOid -q .headRefOid)
          HEAD_REF=$(gh pr view "$PR" --repo "${{ github.repository }}" --json headRefName -q .headRefName)
          echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "head_ref=${HEAD_REF}" >> "$GITHUB_OUTPUT"
          echo "PR #${PR} @ ${HEAD_SHA} (${HEAD_REF})"

      - name: Checkout PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.pr.outputs.head_sha }}
          path: pr-src

      - name: Build PR release binaries
        working-directory: pr-src
        run: |
          set -euo pipefail
          docker build -f Dockerfile --target dist -t spur:perf-pr .
          CID=$(docker create spur:perf-pr)
          mkdir -p /tmp/perf-pr-bins
          for bin in spur spurctld spurd spurdbd; do
            docker cp "$CID:/usr/local/bin/$bin" "/tmp/perf-pr-bins/$bin"
          done
          docker rm "$CID"
          chmod +x /tmp/perf-pr-bins/*

      - name: Download latest nightly binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/nightly-dl
          gh release download nightly --repo "${{ github.repository }}" \
            --pattern 'spur-*.tar.gz' --dir /tmp/nightly-dl
          tar xzf /tmp/nightly-dl/spur-*.tar.gz -C /tmp/nightly-dl
          BINDIR=$(find /tmp/nightly-dl -path '*/bin' -type d | head -1)
          test -n "$BINDIR"
          mkdir -p /tmp/perf-nightly-bins
          cp -a "$BINDIR"/* /tmp/perf-nightly-bins/
          chmod +x /tmp/perf-nightly-bins/*

      - name: Stage perf test assets
        run: |
          set -euo pipefail
          mkdir -p "$PERF_ASSETS_DIR"
          cp -r pr-src/tests "$PERF_ASSETS_DIR/"
          cp -r pr-src/scripts "$PERF_ASSETS_DIR/"
          cp -r pr-src/perf_tests "$PERF_ASSETS_DIR/"

      - name: Set up Python venv
        run: |
          python3 -m venv /tmp/spur-perf-venv
          /tmp/spur-perf-venv/bin/pip install -r "$PERF_ASSETS_DIR/tests/requirements.txt"
          echo "/tmp/spur-perf-venv/bin" >> "$GITHUB_PATH"

      - name: Load SSH key into agent
        run: |
          eval "$(ssh-agent -s)"
          printf '%s\n' "$BM_SSH_KEY" | ssh-add -
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
        env:
          BM_SSH_KEY: ${{ secrets.BM_SSH_KEY }}

      - name: Mask sensitive values
        run: |
          IFS=',' read -ra NODES <<< "$BM_NODES"
          for node in "${NODES[@]}"; do
            node="${node#"${node%%[![:space:]]*}"}"
            node="${node%"${node##*[![:space:]]}"}"
            [ -n "$node" ] && echo "::add-mask::${node}"
          done
          echo "::add-mask::${BM_SSH_USER}"

      - name: Kill stale cluster processes
        run: |
          IFS=',' read -ra NODES <<< "$BM_NODES"
          for node in "${NODES[@]}"; do
            ssh -o StrictHostKeyChecking=accept-new -o BatchMode=yes \
              "${BM_SSH_USER}@${node}" "
              sudo pkill -f '${BM_REMOTE_BIN_DIR}/spurctld' 2>/dev/null || true
              sudo pkill -f '${BM_REMOTE_BIN_DIR}/spurd' 2>/dev/null || true
              sudo rm -rf /tmp/spur-e2e-* 2>/dev/null || true
            " || true
          done

      - name: Run perf (PR binaries)
        env:
          SPUR_TEST_NODES: ${{ env.BM_NODES }}
          SPUR_TEST_SSH_USER: ${{ env.BM_SSH_USER }}
          SPUR_TEST_BINARIES_DIR: /tmp/perf-pr-bins
          SPUR_TEST_REMOTE_BIN_DIR: ${{ env.BM_REMOTE_BIN_DIR_PR }}
          SPUR_PERF_SCRIPTS_DIR: ${{ env.PERF_ASSETS_DIR }}/perf_tests
          SPUR_PERF_RUN_LABEL: pr-${{ inputs.pr_number }}
          SPUR_PERF_JSON_OUT: /tmp/perf-pr.json
        run: |
          chmod +x /tmp/perf-pr-bins/*
          pytest "$PERF_ASSETS_DIR/tests/native_host/e2e/test_scheduler_perf.py" -v -m perf -s

      - name: Cleanup cluster between perf runs
        run: |
          IFS=',' read -ra NODES <<< "$BM_NODES"
          for node in "${NODES[@]}"; do
            ssh -o StrictHostKeyChecking=accept-new -o BatchMode=yes \
              "${BM_SSH_USER}@${node}" "
              sudo pkill -f '${BM_REMOTE_BIN_DIR_PR}/spurctld' 2>/dev/null || true
              sudo pkill -f '${BM_REMOTE_BIN_DIR_PR}/spurd' 2>/dev/null || true
              sudo pkill -f '${BM_REMOTE_BIN_DIR_NIGHTLY}/spurctld' 2>/dev/null || true
              sudo pkill -f '${BM_REMOTE_BIN_DIR_NIGHTLY}/spurd' 2>/dev/null || true
              sudo rm -rf /tmp/spur-e2e-* 2>/dev/null || true
              rm -rf '${BM_REMOTE_BIN_DIR_PR}' '${BM_REMOTE_BIN_DIR_NIGHTLY}' 2>/dev/null || true
            " || true
          done

      - name: Run perf (nightly binaries)
        env:
          SPUR_TEST_NODES: ${{ env.BM_NODES }}
          SPUR_TEST_SSH_USER: ${{ env.BM_SSH_USER }}
          SPUR_TEST_BINARIES_DIR: /tmp/perf-nightly-bins
          SPUR_TEST_REMOTE_BIN_DIR: ${{ env.BM_REMOTE_BIN_DIR_NIGHTLY }}
          SPUR_PERF_SCRIPTS_DIR: ${{ env.PERF_ASSETS_DIR }}/perf_tests
          SPUR_PERF_RUN_LABEL: nightly
          SPUR_PERF_JSON_OUT: /tmp/perf-nightly.json
        run: |
          chmod +x /tmp/perf-nightly-bins/*
          pytest "$PERF_ASSETS_DIR/tests/native_host/e2e/test_scheduler_perf.py" -v -m perf -s

      - name: Compare PR vs nightly
        working-directory: ${{ env.PERF_ASSETS_DIR }}/tests/native_host/e2e
        run: |
          set -euo pipefail
          echo "######## PERF COMPARISON (PR #${{ inputs.pr_number }} vs nightly) ########"
          ARGS=(/tmp/perf-pr.json /tmp/perf-nightly.json)
          if [ "${{ inputs.fail_on_regression }}" = "true" ]; then
            ARGS+=(--fail-on-regression)
          fi
          python -m perf_harness.compare "${ARGS[@]}"

      - name: Cleanup remote processes
        if: always()
        run: |
          IFS=',' read -ra NODES <<< "$BM_NODES"
          for node in "${NODES[@]}"; do
            ssh -o StrictHostKeyChecking=accept-new -o BatchMode=yes \
              "${BM_SSH_USER}@${node}" "
              sudo pkill -f '${BM_REMOTE_BIN_DIR_PR}/spurctld' 2>/dev/null || true
              sudo pkill -f '${BM_REMOTE_BIN_DIR_PR}/spurd' 2>/dev/null || true
              sudo pkill -f '${BM_REMOTE_BIN_DIR_NIGHTLY}/spurctld' 2>/dev/null || true
              sudo pkill -f '${BM_REMOTE_BIN_DIR_NIGHTLY}/spurd' 2>/dev/null || true
              sudo pkill -f '${BM_REMOTE_BIN_DIR}/spurctld' 2>/dev/null || true
              sudo pkill -f '${BM_REMOTE_BIN_DIR}/spurd' 2>/dev/null || true
              sudo rm -rf /tmp/spur-e2e-* 2>/dev/null || true
            " || true
          done

      - name: Cleanup local artifacts
        if: always()
        run: |
          rm -rf /tmp/spur-perf-venv /tmp/perf-pr-bins /tmp/perf-nightly-bins
          rm -rf /tmp/nightly-dl "$PERF_ASSETS_DIR" pr-src
          rm -f /tmp/perf-pr.json /tmp/perf-nightly.json
          ssh-agent -k || true
