[pytest]
pythonpath = native_host k8s/e2e
testpaths = native_host/e2e native_host/perf k8s/e2e
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Sequential execution (pytest default). Do not use pytest-xdist here.
addopts = -p no:xdist
markers =
    rootful: run the cluster fixture with spurd as root (via sudo)
    perf: optional scheduler perf test (excluded from default E2E CI)
